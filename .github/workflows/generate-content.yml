name: "🎬 Content Engine — Multi-Brand"

on:
  # Daily schedule — generates for ALL brands
  schedule:
    - cron: "0 5 * * *"  # 8:00 AM Kyiv time (summer)

  # Manual trigger with brand selection
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand profile (leave empty for all brands)"
        required: false
        default: ""
        type: string
      count:
        description: "Number of videos per brand"
        required: false
        default: "1"
        type: choice
        options: ["1", "2", "3", "5"]
      pillar:
        description: "Content pillar (leave empty for random)"
        required: false
        default: ""
        type: string
      skip_upload:
        description: "Skip upload (generate only)"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Dry run (scenario only, no media)"
        required: false
        default: false
        type: boolean

jobs:
  # Discover which brands to generate for
  discover-brands:
    name: "🔍 Discover brands"
    runs-on: ubuntu-latest
    outputs:
      brands: ${{ steps.find.outputs.brands }}
    steps:
      - uses: actions/checkout@v4

      - id: find
        run: |
          if [ -n "${{ github.event.inputs.brand }}" ]; then
            # Single brand specified
            BRANDS='["${{ github.event.inputs.brand }}"]'
          else
            # All brands (exclude _template.yaml)
            BRANDS=$(ls brands/*.yaml 2>/dev/null | grep -v _template | sed 's|brands/||;s|\.yaml||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "brands=$BRANDS" >> $GITHUB_OUTPUT
          echo "📋 Brands to generate: $BRANDS"

  generate:
    name: "🎬 ${{ matrix.brand }}"
    needs: discover-brands
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        brand: ${{ fromJson(needs.discover-brands.outputs.brands) }}
      fail-fast: false  # Continue other brands if one fails

    steps:
      - name: "📥 Checkout repo"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: "🔧 Setup fonts"
        run: |
          mkdir -p fonts
          curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -o fonts/Montserrat-Bold.ttf
          curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Regular.ttf" -o fonts/Montserrat-Regular.ttf
          curl -sL "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Black.ttf" -o fonts/Montserrat-Black.ttf

      - name: "🎬 Generate content for ${{ matrix.brand }}"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          POST_BRIDGE_API_KEY: ${{ secrets.POST_BRIDGE_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          PILLAR="${{ github.event.inputs.pillar || '' }}"
          SKIP_UPLOAD="${{ github.event.inputs.skip_upload || 'false' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          CMD="python -m src.generate --brand ${{ matrix.brand }} --count $COUNT"

          if [ -n "$PILLAR" ]; then
            CMD="$CMD --pillar $PILLAR"
          fi

          if [ "$SKIP_UPLOAD" = "true" ]; then
            CMD="$CMD --no-upload"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "🚀 Running: $CMD"
          $CMD

      - name: "📊 Upload reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "report-${{ matrix.brand }}-${{ github.run_number }}"
          path: |
            output/${{ matrix.brand }}/run_*.json
            output/${{ matrix.brand }}/*/scenario.json
          retention-days: 30

      - name: "📹 Upload videos"
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: "videos-${{ matrix.brand }}-${{ github.run_number }}"
          path: output/${{ matrix.brand }}/**/*.mp4
          retention-days: 7
