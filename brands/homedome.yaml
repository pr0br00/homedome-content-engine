# ===== HomeDome — Brand Profile =====
# UPS, Solar Stations, ESS systems in Ukraine
# TikTok: @homedomeua | YouTube: @HOMEDOME | Web: homedome.com.ua
# Target: affluent homeowners, business owners, IT professionals

brand:
  id: "homedome"
  name: "HomeDome"
  domain: "homedome.com.ua"
  tagline: "Енергонезалежність для кожного"
  language: "uk"  # Ukrainian
  colors:
    primary: "#1B5E20"      # Dark green
    secondary: "#FFC107"    # Amber/gold
    accent: "#2196F3"       # Blue
    dark: "#121212"
    light: "#FFFFFF"
  logo_path: "assets/homedome_logo.png"

# TTS voice for this brand
tts:
  voice_id: "TX3LPaxmHKxFdv7VOQHJ"  # Liam - Energetic, Social Media Creator
  stability: 0.45
  similarity_boost: 0.8
  speed: 1.05

# AI scenario generation
scenario:
  system_prompt: |
    Ти — комік-сценарист коротких відео для TikTok та YouTube Shorts.
    Ти працюєш на бренд HomeDome (homedome.com.ua) — компанію, яка підбирає,
    постачає та встановлює КОМПЛЕКТИ: сонячні панелі + ДБЖ (безперебійники) +
    ESS-системи (батареї накопичення) для ПРИВАТНИХ БУДИНКІВ в Україні.

    ГОЛОВНИЙ МЕСЕДЖ: Сонячні панелі + ДБЖ = повна автономія. Окремо — безглуздо.
    Панелі без ДБЖ = генеруєш але не зберігаєш. ДБЖ без панелей = батарея яка здохне.

    ЦІЛЬОВА АУДИТОРІЯ:
    - Заможні власники будинків (будинок від 150м², ремонт $50K+)
    - Бізнесмени, IT-шники, підприємці
    - Люди які цінують комфорт і готові платити за ЯКІСТЬ
    - Вік 30-55, мають гроші але ненавидять їх викидати

    ТОН І СТИЛЬ:
    1. ГУМОР — смішно, трохи кринжово, самоіронія. Як друг-задрот розказує за технології.
    2. ПРОВОКАЦІЯ — "сусіди ненавидять", "жінка не вірила", "всі думали я псих"
    3. КОНКРЕТИКА — завжди цифри: "847 000 грн", "за 47 днів", "мінус 73% рахунок"
    4. ЕМОЦІЙНІ СИТУАЦІЇ — блекаут під час важливого зуму, м'ясо зіпсувалось в морозильнику,
       дитина плаче бо не працює WiFi, сусід з генератором воняє на весь район
    5. КРИНЖ-ФОРМАТ — діалоги "Дружина: Скільки??? Я: Зачекай, послухай..."
       або "POV: ти єдиний з світлом на весь район" 
    6. НІКОЛИ не кажи "купи" — кажи "подивись", "зрозумій", "порахуй"
    7. CTA завжди м'який: "Деталі на homedome.com.ua" або "Порахуй свою економію"

    ВАЖЛИВО — правила вірусного контенту:
    1. ХУК (перші 1-2 секунди) — шокуюча цифра, кринж-ситуація, або провокація.
       Людина МУСИТЬ зупинити скрол. Приклади:
       - Сусіди думають я МАЙНЮ КРИПТУ 😂
       - 347 000 грн. Стільки ти ВИКИНУВ на генератор
       - Весь район без світла. Крім МОГО будинку 🏠
       - Дружина сказала "ти псих". Через рік — "ти геній"
       - Сонячні панелі БЕЗ батареї? Це як Tesla без коліс 🤡
    2. КОЖЕН слайд — максимум 10 слів на екрані, але TTS може бути 2-3 речення.
    3. Структура: Хук → Кринж-ситуація → Рішення → Цифри/Доказ → М'який CTA
    4. Мова — УКРАЇНСЬКА, розмовна, молодіжна, з емодзі де доречно.
    5. keywords — 2-3 ключових слова з tts_script для жовтого виділення в субтитрах.

    Відповідай ТІЛЬКИ у форматі JSON.

  slides_count: 5
  max_words_per_slide: 12

  pillars:
    - id: "cringe_flex"
      name: "Кринж-хвастощі"
      description: "Смішні ситуації коли ти єдиний з автономним будинком. Сусіди заздрять, дружина не вірила, всі думали псих. Гумор + флекс результатом. Фокус на бандл панелі+ДБЖ."
      weight: 4
    - id: "rich_problem"
      name: "Проблеми заможних"
      description: "Іронія: маєш дім за мільйони але сидиш зі свічкою. Дорогий ремонт, розумний дім, Tesla в гаражі — і все мертве без світла. Рішення = HomeDome бандл."
      weight: 4
    - id: "money_math"
      name: "Математика грошей"
      description: "Конкретні розрахунки: скільки витрачаєш на генератор/дизель vs панелі+ДБЖ. ROI за 2-4 роки. Зелений тариф. Рахунки до і після. Бізнесмени люблять цифри."
      weight: 3
    - id: "bundle_why"
      name: "Чому саме бандл"
      description: "Чому панелі БЕЗ ДБЖ = гроші на вітер. Чому ДБЖ БЕЗ панелей = дорога батарейка. Тільки комплект = повна автономія 24/7. Аналогії: Tesla без коліс, iPhone без зарядки."
      weight: 3
    - id: "neighbor_war"
      name: "Сусідські війни"
      description: "Кринж-сторі про сусідів: один з генератором воняє, другий з свічками, а герой — з тихою автономією. Формат діалогів і POV. Заздрість як двигун продажів."
      weight: 3
    - id: "flex_install"
      name: "Кейси встановлень"
      description: "Реальні (або реалістичні) кейси: Олександр з Козина, Марина з Ірпеня. Конкретні цифри економії, терміни окупності, реакція родини. Формат: скептик → віруючий."
      weight: 2
    - id: "blackout_horror"
      name: "Хоррор блекауту"
      description: "Страшні але смішні ситуації без світла: зум з інвестором під свічку, м'ясо за 5000 грн зіпсувалось, розумний дім став тупим. Проблема → панелі+ДБЖ = рішення."
      weight: 3

# Upload / social media
upload:
  youtube:
    enabled: true
    default_tags:
      - "ІБП"
      - "сонячні панелі"
      - "ESS"
      - "HomeDome"
      - "енергонезалежність"
      - "сонячна станція"
      - "безперебійник"
      - "автономне живлення"
      - "блекаут"
      - "сонячні панелі для будинку"
      - "ДБЖ для дому"
  tiktok:
    enabled: true

  # Post-Bridge account IDs for this brand
  post_bridge_accounts: [52909, 52910]

# Slide design overrides
slides:
  presets:
    - name: "gradient_dark"
      overlay_opacity: 0.65
      text_color: "#FFFFFF"
      accent_color: "#FFC107"
      font_size_title: 72
      font_size_body: 54
      font_size_hook: 84
    - name: "clean_light"
      overlay_opacity: 0.75
      text_color: "#FFFFFF"
      accent_color: "#4CAF50"
      font_size_title: 68
      font_size_body: 52
      font_size_hook: 80
    - name: "bold_contrast"
      overlay_opacity: 0.70
      text_color: "#FFFFFF"
      accent_color: "#FF5722"
      font_size_title: 76
      font_size_body: 56
      font_size_hook: 88
