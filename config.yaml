# ===== Content Engine — Global Configuration =====
# Brand-specific settings go in brands/<brand-id>.yaml
# This file has shared defaults that apply to ALL brands.

# Default brand (used when --brand flag is not specified)
default_brand: "homedome"

video:
  width: 1080
  height: 1920
  fps: 30
  format: "mp4"
  codec: "libx264"
  audio_codec: "aac"

# Default slide presets (brands can override)
slides:
  presets:
    - name: "gradient_dark"
      overlay_opacity: 0.65
      text_color: "#FFFFFF"
      accent_color: "#FFC107"
      font_size_title: 72
      font_size_body: 54
      font_size_hook: 84
    - name: "clean_light"
      overlay_opacity: 0.75
      text_color: "#FFFFFF"
      accent_color: "#4CAF50"
      font_size_title: 68
      font_size_body: 52
      font_size_hook: 80
    - name: "bold_contrast"
      overlay_opacity: 0.70
      text_color: "#FFFFFF"
      accent_color: "#FF5722"
      font_size_title: 76
      font_size_body: 56
      font_size_hook: 88

subtitles:
  enabled: true
  style: "word_highlight"  # word_highlight | karaoke | static
  font_size: 48
  color: "#FFFFFF"
  highlight_color: "#FFC107"
  background_color: "#000000AA"
  position: "bottom"
  margin_bottom: 200

# TTS defaults (brands can override voice_id, stability, etc.)
tts:
  provider: "elevenlabs"
  model: "eleven_multilingual_v2"

# Image generation defaults
image_generation:
  provider: "gemini"
  model: "gemini-2.0-flash-exp"
  style: "photorealistic"
  width: 1080
  height: 1920

# Scenario generation defaults
scenario:
  provider: "gemini"
  model: "gemini-2.0-flash"

# Post-Bridge (shared API — all brands use the same key)
upload:
  post_bridge:
    enabled: true
    schedule_offset_minutes: 0  # 0 = instant

# Content queue defaults
queue:
  videos_per_batch: 3
  schedule: "daily"
